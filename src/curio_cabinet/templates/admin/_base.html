{# Shared shell for authed admin pages. base.html appends the "Admin"
   (overview) link for logged-in users; Sign out lives on the Settings page. #}
{% extends "base.html" %}
{% block nav %}
  <a href="{{ url_for('admin.todos') }}" {{ 'aria-current=page' if request.endpoint == 'admin.todos' }}>To-Dos</a>
  <a href="{{ url_for('admin.cleanup') }}" {{ 'aria-current=page' if request.endpoint == 'admin.cleanup' }}>Cabinet Cleanup</a>
  <a href="{{ url_for('admin.customize') }}" {{ 'aria-current=page' if request.endpoint == 'admin.customize' }}>Customize</a>
  <a href="{{ url_for('admin.settings') }}" {{ 'aria-current=page' if request.endpoint == 'admin.settings' }}>Settings</a>
{% endblock %}
