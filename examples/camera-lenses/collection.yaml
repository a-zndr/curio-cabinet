# Curio-Cabinet example: a camera-lens collection.
# Nothing in the engine is lens-specific — this is just a field config.
# Full reference: docs/config-reference.md (or `curio-cabinet config-reference`).

collection:
  title: "Lens Cabinet"
  slug: lenses
  id: { strategy: sequential, width: 3 }
  title_field: model
  default_sort: { field: focal_length, order: asc }
  accent: "#3b6fd4"            # a full hex accent (set one in Settings → Customize)

fields:
  - key: brand
    label: Brand
    type: text
    required: true
    suggest: true              # admin form autocompletes from existing brands
    link: brand_url            # render as a link to the brand's site
    views: { table: true, card: secondary, filter: multi, pivot: [group] }

  - key: brand_url
    label: Brand Site
    type: url

  - key: model
    label: Model
    type: text
    required: true
    searchable: true
    views: { table: true }

  - key: mount
    label: Mount
    type: enum
    values: [EF, RF, F, E, X, L, MFT]
    strict: false
    views: { table: true, card: secondary, filter: multi, pivot: [group] }

  - key: focal_length
    label: Focal Length
    type: number
    unit: { label: "mm" }
    views: { table: true, card: secondary, filter: range, pivot: [avg, min, max] }

  - key: max_aperture
    label: Max Aperture
    type: number
    unit: { label: "f/" }
    views: { table: true, filter: range, pivot: [avg] }

  - key: prime
    label: Prime
    type: boolean
    views: { filter: multi, pivot: [group] }

  - key: weight
    label: Weight
    type: number
    unit: { dimension: mass, store: g, display: [g, oz] }
    views: { table: true, filter: range, pivot: [avg] }

  - key: acquired
    label: Acquired
    type: date
    views: { table: true }

  - key: notes
    label: Notes
    type: longtext
    searchable: true

groups:
  - key: lens
    label: Lens
    fields: [brand, brand_url, model, mount, prime]
  - key: optics
    label: Optics
    fields: [focal_length, max_aperture, weight]
  - key: history
    label: History
    fields: [acquired, notes]

presets:
  - key: rf
    label: RF mount
    filter: { field: mount, in: [RF] }
    columns: [brand, model, focal_length, max_aperture, weight]
