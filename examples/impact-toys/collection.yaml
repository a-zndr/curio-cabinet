# Curio-Cabinet collection config: impact toys.
# This is the real-world example the engine was built around.
# Reference for every option: docs/config-reference.md (or `curio-cabinet config-reference`).

collection:
  title: "Zee's Toy Database"
  slug: toys                    # items table name + URL-safe identifier; [a-z][a-z0-9_]*
  id:
    strategy: sequential        # v0: sequential only (zero-padded); uuid/slug reserved
    width: 4                    # "0001", "0002", ...
  title_field: description      # headline on cards and detail pages
  default_sort: { field: maker, order: asc }
  accent_hue: 45                # optional: hue for the UI accent color (oklch)

fields:
  - key: maker
    label: Maker
    type: text
    required: true
    link: maker_web_link        # render the value as a link to this field's URL
    views: { table: true, card: secondary, filter: multi, pivot: [group] }

  - key: maker_web_link
    label: Maker Website
    type: url

  - key: type
    label: Type
    type: enum
    values: [Whip, Galley Whip, Signal Whip, Snake Whip, Bullwhip, Quirt, Cat,
             Flogger, Crop, Dragon Tail, Paddle, Cane, Other]
    strict: false               # admin may add new values; strict: true rejects them
    views: { table: true, card: secondary, filter: multi, pivot: [group] }

  - key: description
    label: Description
    type: text
    required: true
    searchable: true
    views: { table: true }

  - key: materials
    label: Materials
    type: tags
    views: { filter: multi, pivot: [group] }

  - key: length
    label: Length
    type: number
    unit: { dimension: length, store: cm, display: [cm, in] }
    views: { table: true, card: secondary, filter: range, pivot: [avg, min, max] }

  - key: described_length
    label: Described Length
    type: number
    unit: { dimension: length, store: ft, display: [ft] }

  - key: weight
    label: Weight
    type: number
    unit: { dimension: mass, store: g, display: [g, oz] }
    views: { table: true, card: secondary, filter: range, pivot: [avg] }

  - key: weight_per_m
    label: Weight per Meter
    type: number
    unit: { label: "g/m" }      # display suffix only, no conversion

  - key: balance_point
    label: Balance Point
    type: number
    unit: { dimension: length, store: cm, display: [cm, in] }
    views: { filter: range }

  - key: fall
    label: Has Fall
    type: boolean

  - key: handle
    label: Has Handle
    type: boolean

  - key: whip_type
    label: Whip Type
    type: enum
    values: [Bull Whip, Snake Whip, Signal Whip, Hybrid Signal, Stock Whip]
    strict: false
    views: { filter: multi, pivot: [group] }

  - key: plait_count
    label: Plait Count
    type: integer
    views: { filter: range, pivot: [avg] }

  - key: fall_count
    label: Fall Count
    type: integer

  - key: cracker_attachment
    label: Cracker Attachment
    type: text

  - key: fall_length
    label: Fall Length
    type: number
    unit: { dimension: length, store: cm, display: [cm, in] }

  - key: fall_notes
    label: Fall Notes
    type: longtext

  - key: heel_knot_diameter
    label: Heel Knot Diameter
    type: number
    unit: { dimension: length, store: mm, display: [mm] }

  - key: max_diameter
    label: Max Diameter
    type: number
    unit: { dimension: length, store: mm, display: [mm] }

  - key: min_diameter
    label: Min Diameter
    type: number
    unit: { dimension: length, store: mm, display: [mm] }

  - key: rear_balance
    label: Rear Balance
    type: number
    unit: { label: "%" }

  - key: notes
    label: Notes
    type: longtext
    searchable: true

  - key: usage_comments
    label: Usage & Comments
    type: longtext
    searchable: true
    views: { card: secondary }

groups:
  - key: core
    label: Overview
    fields: [maker, maker_web_link, type, description, materials]

  - key: measurements
    label: Measurements
    fields: [length, described_length, weight, weight_per_m, balance_point, fall, handle]

  - key: whip
    label: Whip Details
    when: { field: type, eq: Whip }   # shown on detail/admin only for whips
    fields:
      [whip_type, plait_count, fall_count, cracker_attachment, fall_length,
       fall_notes, heel_knot_diameter, max_diameter, min_diameter, rear_balance]

  - key: commentary
    label: Notes
    fields: [notes, usage_comments]
